{{define "main"}}
    {{with .Resource}}
    <h1>{{.Title}}</h1>
    <table>
        <tr>
            <th>ID</th>
            <td>{{.ID}}</td>
        </tr>
        <tr>
            <th>URL</th>
            <td><a href="{{.URL}}">{{.URL}}</a></td>
        </tr>
        <tr>
            <th>Tag</th>
            <td>{{.Tag}}</td>
        </tr>
        <tr>
            <th>Created</th>
            <td>{{humanDate .Created}}</td>
        </tr>
    </table>
    <p>{{.Note}}</p>
    {{end}}
{{end}}
