{{define "main"}}
<h1>Dev Logs</h1>
<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Tag</th>
        <th>Created</th>
    </tr>
    {{range .Logs}}
    <tr>
        <td>{{.ID}}</td>
        <td>{{.Title}}</td>
        <td>{{.Tag}}</td>
        <td>{{humanDate .Created}}</td>
    </tr>
    {{end}}
</table>
{{end}}
